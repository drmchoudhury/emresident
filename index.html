function fmtTime(ts){ return new Date(ts).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}); }
function fmtDateTime(ts){ const d=new Date(ts); return d.toLocaleDateString([], {month:'short',day:'numeric'}) + ', ' + fmtTime(ts); }

// ============================================================
// Auth
// ============================================================
async function refreshSession(){
  const { data: sess } = await sb.auth.getSession();
  state.user = sess?.session?.user || null;
  if(state.user){
    const { data: prof, error } = await sb.from('profiles').select('*').eq('id', state.user.id).single();
    if(error){ state.profile = null; }
    else { state.profile = prof; }
  } else {
    state.profile = null;
  }
  state.loading = false;
}

async function signUp(e){
  e.preventDefault();
  state.authError = null; state.authInfo = null;
  const f = e.target;
  const email = f.email.value.trim();
  const password = f.password.value;
  const full_name = f.full_name.value.trim();
  const role = f.role.value;
  if(!email || !password || !full_name){ state.authError = 'Fill in all fields.'; render(); return; }

  const submitBtn = f.querySelector('button[type=submit]');
  submitBtn.disabled = true;
  const { data: res, error } = await sb.auth.signUp({
    email, password,
    options: { data: { full_name, role, program_id: PROGRAM_ID } }
  });
  submitBtn.disabled = false;

  if(error){ state.authError = error.message; render(); return; }
  if(res.session){
    await refreshSession();
    render();
  } else {
    state.authInfo = 'Account created. Check your email to confirm, then log in.';
    state.authTab = 'login';
    render();
  }
}

async function signIn(e){
  e.preventDefault();
  state.authError = null; state.authInfo = null;
  const f = e.target;
  const email = f.email.value.trim();
  const password = f.password.value;
  const submitBtn = f.querySelector('button[type=submit]');
  submitBtn.disabled = true;
  const { error } = await sb.auth.signInWithPassword({ email, password });
  submitBtn.disabled = false;
  if(error){ state.authError = error.message; render(); return; }
  await refreshSession();
  await loadAllData();
  render();
}

async function manualRefresh(){
  const btn = document.getElementById('refreshBtn');
  if(btn) btn.classList.add('spinning');
  await loadAllData();
  render();
  // render() recreates the DOM so we can't remove the class from the old element
  // — the spinning class won't survive re-render, which is fine (it stops naturally)
}

async function signOut(){
  await sb.auth.signOut();
  state = { loading:false, user:null, profile:null, authTab:'login', authError:null, authInfo:null, leaveForm:false, clockError:null, expandedResidentId:null, program:null, facilityForm:false, isClocking:false, ipDebug:null, autoCloseNotice:null, monthOverrides:{} };
  data = { myLogs:[], myLeaves:[], allLogs:[], allLeaves:[], profilesById:{}, rotaEntries:[], masterSchedule:[] };
  render();
}

// ============================================================
// Data loading
// ============================================================
async function loadAllData(){
  if(!state.profile) return;
  const { data: prog } = await sb.from('programs').select('*').eq('id', PROGRAM_ID).single();
  state.program = prog || null;
  if(state.profile.role === 'resident'){
    state.autoCloseNotice = null;
    let { data: logs } = await sb.from('time_logs').select('*').eq('resident_id', state.user.id).order('occurred_at', {ascending:false});
    logs = logs || [];
    const closeoutTime = await autoCloseStaleShift([...logs].reverse(), state.user.id);
    if(closeoutTime){
      state.autoCloseNotice = `You were automatically clocked out at ${fmtDateTime(closeoutTime)} after reaching the ${AUTO_CLOCKOUT_HOURS}-hour limit. If you're still on shift, please clock back in.`;
      const refetch = await sb.from('time_logs').select('*').eq('resident_id', state.user.id).order('occurred_at', {ascending:false});
      logs = refetch.data || logs;
    }
    data.myLogs = logs;
    const { data: leaves } = await sb.from('sick_leaves').select('*').eq('resident_id', state.user.id).order('created_at', {ascending:false});
    data.myLeaves = leaves || [];
  } else {
    let { data: logs } = await sb.from('time_logs').select('*').eq('program_id', PROGRAM_ID).order('occurred_at', {ascending:false});
    logs = logs || [];
    const residentIdsInLogs = [...new Set(logs.map(l=>l.resident_id))];
    let anyClosed = false;
    for(const rid of residentIdsInLogs){
      const residentLogsAsc = logs.filter(l=>l.resident_id===rid).sort((a,b)=>new Date(a.occurred_at)-new Date(b.occurred_at));
      const closed = await autoCloseStaleShift(residentLogsAsc, rid);
      if(closed) anyClosed = true;
    }
    if(anyClosed){
      const refetch = await sb.from('time_logs').select('*').eq('program_id', PROGRAM_ID).order('occurred_at', {ascending:false});
      logs = refetch.data || logs;
    }
    data.allLogs = logs;
    const { data: leaves } = await sb.from('sick_leaves').select('*').eq('program_id', PROGRAM_ID).order('created_at', {ascending:false});
    data.allLeaves = leaves || [];
    const { data: profs } = await sb.from('profiles').select('*').eq('program_id', PROGRAM_ID);
    data.profilesById = {};
    (profs || []).forEach(p => data.profilesById[p.id] = p);
    const { data: rota } = await sb.from('rota_entries').select('*').eq('program_id', PROGRAM_ID).order('date', {ascending:true});
    data.rotaEntries = rota || [];
    const { data: ms } = await sb.from('master_schedule').select('*').eq('program_id', PROGRAM_ID).order('block_number', {ascending:true});
    data.masterSchedule = ms || [];
  }
}

// ============================================================
// Geolocation — blocks clock-in if permission is denied
// ============================================================

// Check the current permission state without triggering a prompt.
// Returns 'granted', 'denied', 'prompt', or 'unknown'.
async function checkLocationPermission(){
  try{
    if(!navigator.permissions) return 'unknown';
    const result = await navigator.permissions.query({ name: 'geolocation' });
    return result.state; // 'granted' | 'denied' | 'prompt'
  }catch(e){
    return 'unknown';
  }
}

// Get location. If permission was previously denied, returns a special
// { denied: true } object so the caller can block the action entirely
// rather than recording a clock event without coordinates.
function getLocation(){
  return new Promise((resolve)=>{
    try{
      if(!navigator.geolocation){ resolve({error:'Location services are not available on this device.'}); return; }
      navigator.geolocation.getCurrentPosition(
        pos => resolve({lat:pos.coords.latitude, lng:pos.coords.longitude, accuracy:Math.round(pos.coords.accuracy)}),
        err => {
          // error code 1 = PERMISSION_DENIED
          if(err.code === 1){
            resolve({ denied: true });
          } else {
            resolve({ error: 'Location could not be captured (' + (err.message || 'unknown error') + ').' });
          }
        },
        { enableHighAccuracy:true, timeout:8000 }
      );
    }catch(e){
      resolve({ error:'Location access is blocked in this environment.' });
    }
  });
}

// Human-readable instructions for re-enabling location, per platform.
function locationDeniedMessage(){
  const ua = navigator.userAgent || '';
  if(/iPhone|iPad|iPod/.test(ua)){
    return 'Location access is turned off for this app. To enable it: go to your iPhone Settings → Privacy & Security → Location Services → Safari → set to "While Using". Then return here and try again.';
  } else if(/Android/.test(ua)){
    return 'Location access is blocked. To enable it: tap the lock icon (🔒) in your browser address bar → Permissions → Location → Allow. Then return here and try again.';
  }
  return 'Location access is blocked. Please enable location permission for this site in your browser settings, then try again.';
}

const GEOFENCE_RADIUS_M = 300; // distance from facility, in meters, beyond which a clock event is flagged
const ACCURACY_SUSPICIOUS_MAX_M = 2;   // GPS accuracy reported tighter than this is unusual for a phone and worth a look
const IP_MISMATCH_KM = 150;            // GPS vs IP-geolocation distance beyond this is flagged
const IMPOSSIBLE_SPEED_KMH = 900;      // faster than a commercial flight between two consecutive clock events

function distanceMeters(lat1, lng1, lat2, lng2){
  if(lat1==null || lng1==null || lat2==null || lng2==null) return null;
  const R = 6371000;
  const toRad = d => d * Math.PI / 180;
  const dLat = toRad(lat2-lat1);
  const dLng = toRad(lng2-lng1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLng/2)**2;
  const c = 2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return R * c;
}

// Looks up the approximate location of the caller's IP address (city-level accuracy).
// Used as an independent cross-check against the GPS coordinates — a large mismatch
// can indicate the GPS reading was spoofed (e.g. a fake-location app) or the device is
// connecting through a remote network for some other reason.
let lastIpLookupError = null;

async function lookupIpLocation(){
  lastIpLookupError = null;
  try{
    const controller = new AbortController();
    const timeout = setTimeout(()=>controller.abort(), 4000);
    const res = await fetch('https://ipapi.co/json/', { signal: controller.signal });
    clearTimeout(timeout);
    if(res.ok){
      const json = await res.json();
      if(json && !json.error && json.latitude != null){
        return { ip: json.ip, lat: json.latitude, lng: json.longitude };
      }
      lastIpLookupError = 'ipapi.co: ' + (json?.reason || 'unexpected response');
    } else {
      lastIpLookupError = 'ipapi.co: HTTP ' + res.status;
    }
  }catch(e){
    lastIpLookupError = 'ipapi.co: ' + e.message;
  }
  try{
    const controller = new AbortController();
    const timeout = setTimeout(()=>controller.abort(), 4000);
    const res = await fetch('https://ipwho.is/', { signal: controller.signal });
    clearTimeout(timeout);
    if(res.ok){
      const json = await res.json();
      if(json && json.success !== false){
        return { ip: json.ip, lat: json.latitude, lng: json.longitude };
      }
      lastIpLookupError += ' / ipwho.is: ' + (json?.message || 'unexpected response');
    } else {
      lastIpLookupError += ' / ipwho.is: HTTP ' + res.status;
    }
  }catch(e){
    lastIpLookupError += ' / ipwho.is: ' + e.message;
  }
  return null;
}

// Computes spoofing-risk flags for a chronologically-ordered (oldest first) list of logs.
// Returns a map of log id -> { accuracySuspicious, ipMismatchKm, impossibleSpeedKmh }
function computeRiskFlags(logsAsc){
  const flags = {};
  let prev = null;
  let lastDeviceId = null;
  for(const l of logsAsc){
    const f = {};
    if(l.accuracy_m != null && l.accuracy_m < ACCURACY_SUSPICIOUS_MAX_M){
      f.accuracySuspicious = true;
    }
    if(l.lat != null && l.ip_lat != null){
      const distKm = distanceMeters(l.lat, l.lng, l.ip_lat, l.ip_lng) / 1000;
      if(distKm > IP_MISMATCH_KM) f.ipMismatchKm = distKm;
    }
    if(prev && prev.lat != null && l.lat != null){
      const distKm = distanceMeters(prev.lat, prev.lng, l.lat, l.lng) / 1000;
      const hours = (new Date(l.occurred_at) - new Date(prev.occurred_at)) / 3600000;
      if(hours > 0){
        const speed = distKm / hours;
        if(speed > IMPOSSIBLE_SPEED_KMH) f.impossibleSpeedKmh = speed;
      }
    }
    if(l.device_id && lastDeviceId && l.device_id !== lastDeviceId){
      f.deviceChanged = true;
    }
    if(l.device_id) lastDeviceId = l.device_id;
    flags[l.id] = f;
    prev = l;
  }
  return flags;
}

function hasAnyFlag(f){
  return !!(f && (f.accuracySuspicious || f.ipMismatchKm || f.impossibleSpeedKmh || f.deviceChanged));
}

// ACGME duty-hour compliance checks, computed from chronologically-ordered (oldest first) logs.
// These are heuristic checks based on clock data only — they don't replace a program's
// official duty-hour attestation process, but surface likely violations for review.
const MAX_CONSECUTIVE_HOURS = 24;   // ACGME: 24h continuous duty limit (+4h transition allowed separately)
const MIN_REST_HOURS = 8;           // ACGME: minimum time off between duty periods

// Groups a list of logs (any order) into month "folders", newest first.
// Each folder key is stable (YYYY-M) so expand/collapse state survives re-renders.
function groupLogsByMonth(logs){
  const groups = {};
  for(const l of logs){
    const d = new Date(l.occurred_at);
    const key = d.getFullYear() + '-' + d.getMonth();
    if(!groups[key]) groups[key] = { key, label: d.toLocaleDateString([], {month:'long', year:'numeric'}), logs: [] };
    groups[key].logs.push(l);
  }
  return Object.values(groups).sort((a,b)=> b.key.localeCompare(a.key, undefined, {numeric:true}));
}

// Generates (or retrieves) a random ID persisted in this browser's localStorage, used as a
// rough "this device" fingerprint. This is NOT a hardware identifier — browsers don't expose
// those — it's just a sticky random value. Clearing browser data, using a private/incognito
// window, or switching browsers will all produce a "new device" from this app's perspective,
// even on the resident's own phone. Treat any flag this produces as a prompt to ask, not proof.
function getDeviceId(){
  try{
    let id = localStorage.getItem('em-duty-device-id');
    if(!id){
      id = (crypto.randomUUID ? crypto.randomUUID() : 'dev-' + Math.random().toString(36).slice(2) + Date.now());
      localStorage.setItem('em-duty-device-id', id);
    }
    return id;
  }catch(e){
    return null; // localStorage unavailable (e.g. some private-browsing modes) — fail quietly
  }
}

function getDeviceLabel(){
  const ua = navigator.userAgent || '';
  let os = 'Unknown OS';
  if(/iPhone|iPad|iPod/.test(ua)) os = 'iOS';
  else if(/Android/.test(ua)) os = 'Android';
  else if(/Windows/.test(ua)) os = 'Windows';
  else if(/Mac OS X/.test(ua)) os = 'Mac';
  else if(/Linux/.test(ua)) os = 'Linux';
  let browser = 'Unknown browser';
  if(/CriOS/.test(ua)) browser = 'Chrome (iOS)';
  else if(/FxiOS/.test(ua)) browser = 'Firefox (iOS)';
  else if(/Edg\//.test(ua)) browser = 'Edge';
  else if(/Chrome\//.test(ua)) browser = 'Chrome';
  else if(/Safari\//.test(ua) && !/Chrome/.test(ua)) browser = 'Safari';
  else if(/Firefox\//.test(ua)) browser = 'Firefox';
  return os + ' · ' + browser;
}

function pairShifts(logsAsc){
  const shifts = [];
  let openIn = null;
  for(const l of logsAsc){
    if(l.type === 'in') openIn = { time: new Date(l.occurred_at), log: l };
    else if(l.type === 'out' && openIn){
      shifts.push({ start: openIn.time, end: new Date(l.occurred_at), startLog: openIn.log, endLog: l });
      openIn = null;
    }
  }
  return shifts;
}

// Returns a map of clock-out log id -> shift duration in hours, for displaying
// "this shift was X hours" next to each clock-out without the viewer doing math.
function shiftDurationsByOutId(logsAsc){
  const map = {};
  for(const s of pairShifts(logsAsc)){
    map[s.endLog.id] = (s.end - s.start) / 3600000;
  }
  return map;
}

function acgmeViolationsThisWeek(logsAsc){
  const weekStart = startOfWeek();
  const shifts = pairShifts(logsAsc);
  const violations = [];

  for(const s of shifts){
    if(s.end < weekStart) continue;
    const hrs = (s.end - s.start) / 3600000;
    if(hrs > MAX_CONSECUTIVE_HOURS){
      violations.push(`Shift of ${hrs.toFixed(1)}h exceeds the ${MAX_CONSECUTIVE_HOURS}h continuous-duty limit (ended ${fmtDateTime(s.end)})`);
    }
  }

  for(let i=1;i<shifts.length;i++){
    if(shifts[i].start < weekStart) continue;
    const restHrs = (shifts[i].start - shifts[i-1].end) / 3600000;
    if(restHrs < MIN_REST_HOURS){
      violations.push(`Only ${restHrs.toFixed(1)}h rest before shift starting ${fmtDateTime(shifts[i].start)} (minimum ${MIN_REST_HOURS}h)`);
    }
  }

  const todayIdx = Math.floor((Date.now() - weekStart.getTime()) / 86400000);
  const workedDays = new Set();
  shifts.forEach(s=>{
    let d = new Date(s.start); d.setHours(0,0,0,0);
    const endDay = new Date(s.end); endDay.setHours(0,0,0,0);
    while(d <= endDay){ workedDays.add(d.toISOString().slice(0,10)); d.setDate(d.getDate()+1); }
  });
  let hasDayOff = false;
  for(let i=0;i<=todayIdx && i<7;i++){
    const d = new Date(weekStart); d.setDate(d.getDate()+i);
    if(!workedDays.has(d.toISOString().slice(0,10))){ hasDayOff = true; break; }
  }
  if(!hasDayOff && todayIdx >= 6){
    violations.push('No day off so far this week (ACGME requires one day in seven free of duty)');
  }

  return violations;
}

function daysWorkedThisMonth(logs){
  if(!logs || logs.length===0) return 0;
  const now = new Date();
  const monthKey = now.getFullYear() + '-' + now.getMonth();
  const days = new Set();
  for(const l of logs){
    if(l.type !== 'in') continue;
    const d = new Date(l.occurred_at);
    if((d.getFullYear() + '-' + d.getMonth()) === monthKey){
      days.add(d.toISOString().slice(0,10));
    }
  }
  return days.size;
}

function downloadCsv(filename, rows){
  const csv = rows.map(row => row.map(cell => {
    const s = (cell == null) ? '' : String(cell);
    return /[",\n]/.test(s) ? '"' + s.replace(/"/g,'""') + '"' : s;
  }).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

const AUTO_CLOCKOUT_HOURS = 12; // open shifts longer than this are automatically closed out

// Checks a chronologically-ordered (oldest first) log list for an open clock-in older
// than AUTO_CLOCKOUT_HOURS, and if found, inserts a system-generated clock-out at
// exactly the limit. Returns the closeout Date if one was created, otherwise null.
async function autoCloseStaleShift(logsAsc, residentId){
  if(!logsAsc || logsAsc.length === 0) return null;
  const last = logsAsc[logsAsc.length - 1];
  if(last.type !== 'in') return null;
  const hoursOpen = (Date.now() - new Date(last.occurred_at).getTime()) / 3600000;
  if(hoursOpen < AUTO_CLOCKOUT_HOURS) return null;
  const closeoutTime = new Date(new Date(last.occurred_at).getTime() + AUTO_CLOCKOUT_HOURS*3600000);
  await sb.from('time_logs').insert({
    resident_id: residentId,
    program_id: PROGRAM_ID,
    type: 'out',
    occurred_at: closeoutTime.toISOString(),
    lat: null, lng: null, accuracy_m: null,
    ip_address: null, ip_lat: null, ip_lng: null,
    auto_closed: true
  });
  return closeoutTime;
}

function residentStatus(logs, leaves){
  const today = new Date().toISOString().slice(0,10);
  const onLeaveToday = (leaves||[]).some(s => s.status==='approved' && s.start_date<=today && today<=s.end_date);
  if(onLeaveToday) return 'leave';
  if(!logs || logs.length===0) return 'off';
  return logs[0].type === 'in' ? 'on' : 'off';
}

function startOfWeek(){
  const d = new Date();
  const day = d.getDay(); // 0 = Sunday
  const diff = day === 0 ? 6 : day - 1; // treat Monday as start of week
  d.setDate(d.getDate() - diff);
  d.setHours(0,0,0,0);
  return d;
}

// Pairs chronological in/out events and sums duration since the start of this week.
// An open clock-in (no matching out yet) counts up to "now".
function hoursThisWeek(logs){
  if(!logs || logs.length===0) return 0;
  const weekStart = startOfWeek().getTime();
  const sorted = [...logs].sort((a,b)=> new Date(a.occurred_at) - new Date(b.occurred_at));
  let totalMs = 0;
  let openIn = null;
  for(const l of sorted){
    const t = new Date(l.occurred_at).getTime();
    if(l.type === 'in'){
      openIn = t;
    } else if(l.type === 'out' && openIn !== null){
      const start = Math.max(openIn, weekStart);
      const end = t;
      if(end > start) totalMs += (end - start);
      openIn = null;
    }
  }
  if(openIn !== null){
    const start = Math.max(openIn, weekStart);
    const end = Date.now();
    if(end > start) totalMs += (end - start);
  }
  return totalMs / 3600000;
}

async function clockAction(type){
  if(state.isClocking) return; // guard against double-taps while a request is in flight
  state.isClocking = true;
  state.clockError = null;
  render();

  // Hard watchdog — if anything hangs beyond 15 seconds, re-enable the button
  // so the resident isn't permanently stuck on "Saving..."
  const watchdog = setTimeout(()=>{
    if(state.isClocking){
      state.isClocking = false;
      state.clockError = 'Clock event timed out — please try again. If this keeps happening, check your internet connection.';
      render();
    }
  }, 15000);

  try{
    // Check permission state before attempting — if already denied, block immediately
    // without even triggering the browser prompt (which won't appear again once denied).
    const permState = await checkLocationPermission();
    if(permState === 'denied'){
      state.isClocking = false;
      state.clockError = '🚫 ' + locationDeniedMessage();
      render();
      clearTimeout(watchdog);
      return;
    }

    let loc;
    try{ loc = await getLocation(); }
    catch(e){ loc = { error:'Location access is blocked in this environment.' }; }

    // If the user just tapped "Deny" on the prompt that appeared, block the clock-in
    if(loc.denied){
      state.isClocking = false;
      state.clockError = '🚫 ' + locationDeniedMessage();
      render();
      clearTimeout(watchdog);
      return;
    }

    const ipLoc = await lookupIpLocation();
    state.ipDebug = ipLoc ? `IP captured: ${ipLoc.ip}` : `IP lookup failed — ${lastIpLookupError || 'unknown reason'}`;

    const { error } = await sb.from('time_logs').insert({
      resident_id: state.user.id,
      program_id: PROGRAM_ID,
      type,
      occurred_at: new Date().toISOString(),
      lat: loc.error ? null : loc.lat,
      lng: loc.error ? null : loc.lng,
      accuracy_m: loc.error ? null : loc.accuracy,
      ip_address: ipLoc ? ipLoc.ip : null,
      ip_lat: ipLoc ? ipLoc.lat : null,
      ip_lng: ipLoc ? ipLoc.lng : null,
      device_id: getDeviceId(),
      device_label: getDeviceLabel()
    });

    if(error){
      state.clockError = 'Could not save clock event: ' + error.message;
    } else if(loc.error){
      state.clockError = loc.error + ' The clock event was still recorded, but without a location.';
    }
  } catch(e){
    state.clockError = 'Unexpected error — please try again: ' + e.message;
  } finally{
    clearTimeout(watchdog);
    state.isClocking = false;
    await loadAllData();
    render();
  }
}

async function submitLeave(e){

  const f = e.target;
  const start_date = f.start.value, end_date = f.end.value, reason = f.reason.value.trim();
  if(!start_date || !end_date || !reason) return;
  await sb.from('sick_leaves').insert({
    resident_id: state.user.id, program_id: PROGRAM_ID,
    start_date, end_date, reason, status:'pending'
  });
  state.leaveForm = false;
  await loadAllData();
  render();
}

  await loadAllData();

}

async function saveFacilityLocation(e){
  e.preventDefault();
  const f = e.target;
  const lat = parseFloat(f.lat.value);
  const lng = parseFloat(f.lng.value);
  if(isNaN(lat) || isNaN(lng)){
    state.clockError = 'Enter valid numbers for latitude and longitude.';
    render();
    return;
  }
  const { data: updated, error } = await sb.from('programs').update({ facility_lat: lat, facility_lng: lng }).eq('id', PROGRAM_ID).select();
  if(error){
    state.clockError = 'Could not save hospital location: ' + error.message;
    render();
    return;
  }
  if(!updated || updated.length === 0){
    state.clockError = 'Hospital location was not saved — your account may not have director permissions on this program, or a database permissions update is needed.';
    render();
    return;
  }
  state.clockError = null;
  state.facilityForm = false;
  await loadAllData();
  render();
}

  const loc = await getLocation();
  if(loc.error){
    state.clockError = loc.error;

  document.querySelector('input[name="lat"]').value = loc.lat.toFixed(6);
  document.querySelector('input[name="lng"]').value = loc.lng.toFixed(6);
}

const ED_SHIFT_RE = /^(D|E|N)\s*(Resus|Zone|UCC|Ped|EM|2\s*Ped)/i;
const LEAVE_TYPES = ['annual leave','study leave','exam leave','off','sick leave','sl','leave'];

function classifyAssignment(a){
  if(!a) return 'empty';
  const lo = a.toLowerCase().trim();
  if(LEAVE_TYPES.some(l=>lo.startsWith(l))) return 'leave';
  if(lo==='off') return 'off';
  if(lo.startsWith('ad')) return 'admin';
  if(ED_SHIFT_RE.test(a.trim())) return 'ed_shift';
  return 'external';
}

function shiftStartHour(assignment){
  if(!assignment) return null;
  const lo = assignment.trim().toLowerCase();
  // Check for combined entries like AD/N Resus
  if(lo.includes('/n ') || lo.startsWith('n ') || lo==='n') return 22;
  if(lo.includes('/e ') || lo.startsWith('e ') || lo==='e') return 14;
  if(lo.includes('/d ') || lo.startsWith('d ') || lo==='d') return 6;
  if(lo.startsWith('ad')) return 8;
  if(lo.startsWith('n')) return 22;
  if(lo.startsWith('e')) return 14;
  if(lo.startsWith('d')) return 6;
  return null;
}

function excelSerialToDateStr(serial){
  const d = new Date(Date.UTC(1899, 11, 30) + serial * 86400 * 1000);
  return `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`;
}

function parseRotaExcel(arrayBuffer){
  const wb = XLSX.read(new Uint8Array(arrayBuffer), {type:'array', cellDates:false});
  const ws = wb.Sheets[wb.SheetNames[0]];
  const raw = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
  if(raw.length < 3) return null;

  // Row 0: Block name + rotation group headers (merged, so fill-forward)
  const groupRow = raw[0].map(c=>String(c||'').trim());
  let blockName = groupRow[0] || 'Block';
  let curGroup = '';
  const groupByCol = {};
  for(let c=0;c<groupRow.length;c++){
    if(groupRow[c]) curGroup = groupRow[c];
    groupByCol[c] = curGroup;
  }

  // Row 1: "Day", "Date", then resident names
  const headerRow = raw[1];
  const SUMMARY_KEYWORDS = ['residents','interns','total','d resus','e resus','n resus'];
  const residentCols = [];
  for(let c=2;c<headerRow.length;c++){
    const name = String(headerRow[c]||'').trim();
    if(!name) continue;
    if(SUMMARY_KEYWORDS.some(k=>name.toLowerCase().startsWith(k))) continue;
    if(/^\d+$/.test(name)) continue;
    residentCols.push({ col:c, name, group: groupByCol[c]||'Unknown' });
  }

  // Rows 2+: data
  const entries = [];
  for(let r=2;r<raw.length;r++){
    const row = raw[r];
    const serial = Number(row[1]);
    if(!serial || serial < 40000) continue; // skip summary/empty rows
    const dateStr = excelSerialToDateStr(serial);
    for(const rc of residentCols){
      const assignment = String(row[rc.col]||'').trim();
      if(!assignment) continue;
      entries.push({ date:dateStr, residentNameRota:rc.name, rotationGroup:rc.group, assignment });
    }
  }
  return { blockName, residentCols, entries };
}

function suggestMatch(rotaName, profiles){
  // Try first-name match against app profiles
  const first = rotaName.split(/[\s,]/)[0].toLowerCase();
  return Object.values(profiles).find(p=> p.role==='resident' && p.full_name.toLowerCase().startsWith(first)) || null;
}

async function saveRotaEntries(blockName, entries, mapping){
  // mapping: rotaName -> profileId (or '' to skip)
  // Delete existing entries for this block first
  await sb.from('rota_entries').delete().eq('program_id', PROGRAM_ID).eq('block_name', blockName);
  const rows = entries.map(e=>({
    program_id: PROGRAM_ID,
    block_name: blockName,
    date: e.date,
    resident_name_rota: e.residentNameRota,
    resident_id: mapping[e.residentNameRota] || null,
    rotation_group: e.rotationGroup,
    assignment: e.assignment
  }));
  // Insert in batches of 200
  for(let i=0;i<rows.length;i+=200){
    const {error} = await sb.from('rota_entries').insert(rows.slice(i,i+200));
    if(error) return error;
  }
  return null;
}

// Convert any date or timestamp to a LOCAL "YYYY-MM-DD" string.
// Using toISOString().slice(0,10) returns UTC dates, which in UAE (+4) can be
// one day behind local time after midnight. All calendar date comparisons must
// use LOCAL dates to match the displayed calendar rows.
function toLocalDateStr(d){
  const date = d instanceof Date ? d : new Date(d);
  return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
}

function rotaWeekDates(offset){
  const today = new Date(); today.setHours(0,0,0,0); // local midnight
  const mon = new Date(today);
  mon.setDate(today.getDate() - (today.getDay()===0?6:today.getDay()-1) + offset*7);
  return Array.from({length:7}, (_,i)=>{ const d=new Date(mon); d.setDate(mon.getDate()+i); return d; });
}

function fmtDateShort(d){ return d.toLocaleDateString([],{weekday:'short',month:'short',day:'numeric'}); }

function isClockedInOnDate(residentId, dateStr){
  const dayLogs = data.allLogs
    .filter(l=>l.resident_id===residentId && toLocalDateStr(l.occurred_at)===dateStr)
    .sort((a,b)=>new Date(a.occurred_at)-new Date(b.occurred_at));
  if(!dayLogs.length) return false;
  return dayLogs[dayLogs.length-1].type === 'in';
}

function getDayLogs(residentId, dateStr){
  return data.allLogs
    .filter(l=>l.resident_id===residentId && toLocalDateStr(l.occurred_at)===dateStr)
    .sort((a,b)=>new Date(a.occurred_at)-new Date(b.occurred_at));
}

// Returns true if any clock event for this resident on this date carries a risk flag.
// Uses the full resident log list so impossible-speed detection works across days.
function getResidentDayFlags(residentId, dateStr){
  const allResidentLogs = data.allLogs
    .filter(l=>l.resident_id===residentId)
    .sort((a,b)=>new Date(a.occurred_at)-new Date(b.occurred_at));
  const flags = computeRiskFlags(allResidentLogs);
  return allResidentLogs
    .filter(l=>toLocalDateStr(l.occurred_at)===dateStr)
    .some(l=>hasAnyFlag(flags[l.id]));
}

function isLeaveApprovedOnDate(residentId, dateStr){
  return data.allLeaves.some(l=>l.resident_id===residentId && l.status==='approved' && l.start_date<=dateStr && dateStr<=l.end_date);
}

function rotaCellStyle(assignment, residentId, dateStr){
  const kind = classifyAssignment(assignment);
  const lo = (assignment||'').toLowerCase().trim();

  if(lo==='off') return { bg:'#F0F0F0', color:'#999', text:'OFF' };
  if(kind==='leave') return { bg:'#FBE8C6', color:'#8A5A02', text:assignment };
  if(kind==='empty') return { bg:'#fff', color:'#ccc', text:'—' };

  if(residentId && isLeaveApprovedOnDate(residentId, dateStr))
    return { bg:'#FBE8C6', color:'#8A5A02', text:'Leave (app)' };

  // Text colour by assignment kind — background always set by clock logic below
  // External and admin use coloured text only for neutral/future states;
  // for clock-based backgrounds (green/red) we always use white for legibility.
  const neutralTextColor = kind==='external' ? '#6B3F9E' : kind==='admin' ? '#3A5FA0' : '#fff';

  // Neutral background when no resident is matched (can't check clocks)
  if(!residentId){
    const neutralBg = kind==='external' ? '#F0EBF8' : kind==='admin' ? '#EEF5FF' : '#F4F4F4';
    return { bg:neutralBg, color:neutralTextColor, text:assignment };
  }

  // Default shift start: external and admin default to 08:00
  const startHour = (kind==='external' || kind==='admin') ? 8 : (shiftStartHour(assignment)||6);
  const now = new Date();
  // Parse dateStr as LOCAL midnight to avoid UTC-offset issues in UAE (+4)
  const [dYr, dMo, dDy] = dateStr.split('-').map(Number);
  const d = new Date(dYr, dMo-1, dDy); // local midnight
  const shiftStart = new Date(dYr, dMo-1, dDy, startHour, 0, 0); // local shift start
  const todayStr = toLocalDateStr(now);
  const isFutureDate = dateStr > todayStr;
  const shiftHasStarted = now >= shiftStart;

  // Future date: neutral
  if(isFutureDate){
    const futureBg = kind==='external' ? '#F5F0FB' : '#fff';
    return { bg:futureBg, color:neutralTextColor, text:assignment };
  }

  if(shiftHasStarted){
    const dayLogs = getDayLogs(residentId, dateStr);
    const hasIn   = dayLogs.some(l=>l.type==='in');
    const hasOut  = dayLogs.some(l=>l.type==='out');
    const lastIsIn = dayLogs.length>0 && dayLogs[dayLogs.length-1].type==='in';

    // Magenta: any flagged clock event (overrides all green states)
    if(dayLogs.length>0 && getResidentDayFlags(residentId, dateStr))
      return { bg:'#D946EF', color:'#fff', text:assignment };

    // Bright green: currently on duty — always white text
    if(lastIsIn) return { bg:'#16A34A', color:'#fff', text:assignment };

    // Light green: completed a full in→out cycle — always dark text for legibility
    const lightGreenText = kind==='admin' ? '#1E3A6B' : '#14532D';
    if(hasIn && hasOut) return { bg:'#86EFAC', color:lightGreenText, text:assignment };

    // Red: past shift start, never clocked in — always white text
    return { bg:'#EF4444', color:'#fff', text:assignment };
  }

  // Shift not yet started today
  const pendingBg = kind==='external' ? '#F5F0FB' : '#F7F9FF';
  const pendingColor = kind==='external' ? '#9B77CC' : '#6080B0';
  return { bg:pendingBg, color:pendingColor, text:assignment };
}

async function handleRotaFile(file){
  try{
    const buf = await file.arrayBuffer();
    const parsed = parseRotaExcel(buf);
    if(!parsed || !parsed.entries.length){ state.rotaError = 'Could not parse this file. Make sure it is the block rota Excel.'; render(); return; }
    state.rotaParsed = parsed;
    state.rotaMapping = {};
    // Pre-fill suggested matches
    for(const rc of parsed.residentCols){
      const s = suggestMatch(rc.name, data.profilesById);
      if(s) state.rotaMapping[rc.name] = s.id;
    }
    state.rotaError = null;
    render();
  }catch(e){
    state.rotaError = 'Error reading file: ' + e.message;
    render();
  }
}

async function handleRotaSave(){
  if(!state.rotaParsed) return;
  state.rotaSaving = true; render();
  const error = await saveRotaEntries(state.rotaParsed.blockName, state.rotaParsed.entries, state.rotaMapping);
  if(error){ state.rotaError = 'Save failed: ' + error.message; state.rotaSaving = false; render(); return; }
  state.rotaSaving = false;
  state.rotaParsed = null;
  state.rotaTab = 'calendar';
  state.rotaError = null;
  await loadAllData();
  render();
}

// Assignments that mean the resident is in ED or Ped ED (will appear in block rota)
const ED_ASSIGNMENTS_RE = /^(AEM|PEM|ED\s*\/?\s*US|EMS|ED\s*\/\s*admin|RESEARCH\/ED|ELECTIVE.*EM)/i;

function isEdAssignment(a){
  if(!a) return false;
  return ED_ASSIGNMENTS_RE.test(a.trim());
}

function cleanMasterAssignment(raw){
  if(!raw) return '';
  return raw
    .replace(/\s+(resigned|xxxx+|skmc)\s*/gi, '')
    .trim();
}

const MONTH_MAP = {jan:0,feb:1,mar:2,march:2,apr:3,april:3,may:4,jun:5,june:5,jul:6,july:6,aug:7,sep:8,oct:9,nov:10,dec:11};

function parseBlockDateRange(str, academicStartYear){
  // "6 July-2 Aug", "1 Sep- 28 Sep", "22 Dec - 18 Jan"
  if(!str) return null;
  const parts = str.split('-').map(s=>s.trim()).filter(Boolean);
  if(parts.length < 2) return null;
  function parsePart(s){
    const m = s.match(/(\d+)\s*([A-Za-z]+)/);
    if(!m) return null;
    const day = parseInt(m[1]);
    const mo = MONTH_MAP[m[2].toLowerCase().slice(0,3)];
    if(mo===undefined) return null;
    const yr = mo >= 8 ? academicStartYear : academicStartYear+1;
    const d = new Date(yr, mo, day); // LOCAL midnight
    return toLocalDateStr(d); // LOCAL date string to match calendar system
  }
  const start = parsePart(parts[0]);
  const end = parsePart(parts[parts.length-1]);
  return (start && end) ? {start, end} : null;
}

function parseMasterExcel(arrayBuffer){
  const wb = XLSX.read(new Uint8Array(arrayBuffer), {type:'array', cellDates:false});
  const ws = wb.Sheets[wb.SheetNames[0]];
  const raw = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
  if(raw.length < 6) return null;

  // Row 1 (index 1): block names
  // Row 2 (index 2): date ranges
  const blockRow = raw[1];
  const dateRow  = raw[2];

  // Build block info: col index → {blockNum, blockName, start, end}
  const ACAD_YEAR = 2025; // academic year start
  const blocks = {};
  for(let c=2; c<blockRow.length; c++){
    const bn = String(blockRow[c]||'').trim();
    const dr = String(dateRow[c]||'').trim();
    if(!bn || !dr) continue;
    const num = parseInt(bn.replace(/\D+/g,''));
    if(!num) continue;
    const dates = parseBlockDateRange(dr, ACAD_YEAR);
    if(dates) blocks[c] = { blockNum:num, blockName:bn, start:dates.start, end:dates.end };
  }

  // Rows 5+ (index 5+): residents
  const residents = [];
  let currentYear = '';
  for(let r=5; r<raw.length; r++){
    const col0 = String(raw[r][0]||'').trim();
    const col1 = String(raw[r][1]||'').trim();
    if(col0.match(/^R\d/)) currentYear = col0;
    if(!col1 || col1.toLowerCase()==='none') continue;
    const entries = [];
    for(const [c, blk] of Object.entries(blocks)){
      const raw_a = String(raw[r][c]||'').trim();
      const assignment = cleanMasterAssignment(raw_a);
      if(!assignment) continue;
      entries.push({
        blockNum: blk.blockNum,
        blockName: blk.blockName,
        blockStart: blk.start,
        blockEnd: blk.end,
        assignment,
        isExternal: !isEdAssignment(assignment)
      });
    }
    if(entries.length) residents.push({ name:col1, yearGroup:currentYear, entries });
  }

  return { academicYear:`${ACAD_YEAR}-${ACAD_YEAR+1}`, residents };
}

async function saveMasterSchedule(parsed, mapping){
  await sb.from('master_schedule').delete().eq('program_id', PROGRAM_ID).eq('academic_year', parsed.academicYear);
  const rows = [];
  for(const res of parsed.residents){
    for(const e of res.entries){
      rows.push({
        program_id: PROGRAM_ID,
        academic_year: parsed.academicYear,
        resident_name_master: res.name,
        resident_id: mapping[res.name] || null,
        year_group: res.yearGroup,
        block_number: e.blockNum,
        block_start_date: e.blockStart,
        block_end_date: e.blockEnd,
        assignment: e.assignment,
        is_external: e.isExternal
      });
    }
  }
  for(let i=0;i<rows.length;i+=200){
    const {error} = await sb.from('master_schedule').insert(rows.slice(i,i+200));
    if(error) return error;
  }
  return null;
}

function getMasterEntryForDate(residentId, dateStr){
  return data.masterSchedule.find(e=>
    e.resident_id===residentId &&
    e.block_start_date<=dateStr &&
    dateStr<=e.block_end_date
  ) || null;
}

function renderResident(){
  const status = residentStatus(data.myLogs, data.myLeaves);
  const isOn = status==='on';
  const now = new Date();
  const myLogsAsc = [...data.myLogs].sort((a,b)=>new Date(a.occurred_at)-new Date(b.occurred_at));
  const myShiftDurations = shiftDurationsByOutId(myLogsAsc);
  const myHoursThisWeek = hoursThisWeek(data.myLogs);
  root.innerHTML = `
    ${topbar('Resident view')}
    <div class="clock-card">
      <div>
        <div class="clock-time mono" id="live-clock">${now.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'})}</div>
        <div class="clock-date">${now.toLocaleDateString([], {weekday:'long', month:'long', day:'numeric'})}</div>
        <div class="pill ${status}"><span class="dot"></span>${status==='on'?'On duty':status==='leave'?'On approved leave':'Off duty'}</div>
      </div>
      <div class="clock-action" style="text-align:right;">
        <button class="${isOn?'btn-out':'btn-in'}" id="clockBtn" ${state.isClocking ? 'disabled' : ''}>${state.isClocking ? 'Saving…' : (isOn?'Clock Out':'Clock In')}</button>
        <div class="geo-note">Location is captured at the moment you clock in or out.</div>
      </div>
    </div>
    ${state.clockError ? `<div class="err${state.clockError.startsWith('🚫') ? ' location-blocked' : ''}">${state.clockError}</div>` : ''}
    ${state.autoCloseNotice ? `<div class="err" style="background:var(--amber-soft);color:#8A5A02;">${state.autoCloseNotice}</div>` : ''}
    ${state.ipDebug ? `<div class="log-meta mono" style="margin-top:6px;">${state.ipDebug}</div>` : ''}

    <div class="grid">
      <div class="card">
        <h2>Recent activity <span class="count">${myHoursThisWeek.toFixed(1)}h this week</span></h2>
        ${data.myLogs.length===0 ? '<div class="empty">No clock events yet.</div>' :
          data.myLogs.slice(0,8).map(l=>`
            <div class="log-row">
              <div>
                <span class="log-type ${l.type}">${l.type==='in'?'Clocked in':'Clocked out'}</span>
                ${(l.type==='out' && myShiftDurations[l.id]!=null) ? `<span class="badge approved" style="margin-left:6px;">${myShiftDurations[l.id].toFixed(1)}h shift</span>` : ''}
                ${l.auto_closed ? `<span class="badge pending" style="margin-left:6px;">Auto-closed</span>` : ''}
                <div class="log-meta mono">${l.lat!=null ? l.lat.toFixed(4)+', '+l.lng.toFixed(4)+' · ±'+l.accuracy_m+'m' : (l.auto_closed ? 'no location (system event)' : 'location unavailable')}</div>
              </div>
              <div class="log-meta mono">${fmtDateTime(l.occurred_at)}</div>
            </div>
          `).join('')
        }
      </div>

      <div class="card">
        <h2>Sick leave <button class="small-btn" id="toggleLeaveForm" style="float:right;">${state.leaveForm?'Cancel':'+ Report'}</button></h2>
        ${state.leaveForm ? `
          <form class="leave-form" id="leaveForm">
            <div class="field-row">
              <div class="field"><label>Start date</label><input type="date" name="start" required /></div>
              <div class="field"><label>End date</label><input type="date" name="end" required /></div>
            </div>
            <div class="field"><label>Reason</label><textarea name="reason" placeholder="Brief reason for leave" required></textarea></div>
            <button type="submit" class="submit-btn">Submit request</button>
          </form>
        ` : (data.myLeaves.length===0 ? '<div class="empty">No leave requests filed.</div>' :
          data.myLeaves.map(l=>`
            <div class="log-row">
              <div><span class="resident-name">${l.start_date} → ${l.end_date}</span><div class="log-meta">${l.reason}</div></div>
              <span class="badge ${l.status}">${l.status}</span>
            </div>
          `).join('')
        )}
      </div>
    </div>
  `;
  document.getElementById('clockBtn').onclick = ()=>clockAction(isOn?'out':'in');
  document.getElementById('logoutBtn').onclick = signOut;
  const rb1 = document.getElementById('refreshBtn'); if(rb1) rb1.onclick = manualRefresh;
  document.getElementById('toggleLeaveForm').onclick = ()=>{ state.leaveForm = !state.leaveForm; render(); };
  const lf = document.getElementById('leaveForm');
  if(lf) lf.onsubmit = submitLeave;
}

function renderDirector(){
  const residentIds = Object.keys(data.profilesById).filter(id => data.profilesById[id].role === 'resident');
  const onDutyCount = residentIds.filter(id => {
    const logs = data.allLogs.filter(l=>l.resident_id===id);
    const leaves = data.allLeaves.filter(l=>l.resident_id===id);
    return residentStatus(logs, leaves) === 'on';
  }).length;
  const pendingLeaves = data.allLeaves.filter(s=>s.status==='pending');
  const todayStr = new Date().toISOString().slice(0,10);
  const todaysClockins = data.allLogs.filter(l=>l.type==='in' && l.occurred_at.slice(0,10)===todayStr).length;
  const hasFacility = state.program && state.program.facility_lat != null && state.program.facility_lng != null;

  root.innerHTML = `
    ${topbar('Program director view')}
    <div class="stat-row">
      <div class="stat"><div class="num">${residentIds.length}</div><div class="label">Residents in program</div></div>
      <div class="stat"><div class="num">${onDutyCount}</div><div class="label">Currently on duty</div></div>
      <div class="stat"><div class="num">${todaysClockins}</div><div class="label">Clock-ins today</div></div>
      <div class="stat"><div class="num">${pendingLeaves.length}</div><div class="label">Pending leave requests</div></div>
    </div>

    <div style="display:flex;gap:10px;margin-bottom:18px;">
      <button class="small-btn" id="exportLogsBtn">⬇ Export time logs (CSV)</button>
      <button class="small-btn" id="exportLeaveBtn">⬇ Export leave requests (CSV)</button>
    </div>

    <div class="card" style="margin-bottom:18px;">
      <h2>Hospital location ${hasFacility ? `<button class="small-btn" id="toggleFacilityForm" style="float:right;">${state.facilityForm?'Cancel':'Edit'}</button>` : ''}</h2>
      ${state.clockError ? `<div class="err" style="margin-bottom:10px;">${state.clockError}</div>` : ''}
      ${(!hasFacility || state.facilityForm) ? `
        <form class="leave-form" id="facilityForm">
          <p style="font-size:13px;color:var(--slate);margin:0 0 4px;">Set the hospital's coordinates so off-site clock-ins/outs can be flagged automatically.</p>
          <div class="field-row">
            <div class="field"><label>Latitude</label><input type="text" name="lat" value="${state.program?.facility_lat ?? ''}" required /></div>
            <div class="field"><label>Longitude</label><input type="text" name="lng" value="${state.program?.facility_lng ?? ''}" required /></div>
          </div>
          <div style="display:flex;gap:10px;align-items:center;">
            <button type="submit" class="submit-btn">Save location</button>
            <button type="button" class="small-btn" id="useCurrentLocBtn">Use my current location</button>
          </div>
        </form>
      ` : `
        <div class="log-meta mono">${state.program.facility_lat.toFixed(5)}, ${state.program.facility_lng.toFixed(5)} · clock events beyond ${GEOFENCE_RADIUS_M}m are flagged</div>
      `}
    </div>

    <div class="card" style="margin-bottom:18px;">
      <h2>Resident status <span class="count">live</span></h2>
      ${residentIds.length===0 ? '<div class="empty">No residents have signed up yet.</div>' : `
      <div class="table-scroll">
      <table>
        <tr><th></th><th>Resident</th><th>Status</th><th>Last event</th><th>Hours this week</th><th>Days this month</th><th>Location</th><th>Flags</th></tr>
        ${residentIds.map(id=>{
          const logs = data.allLogs.filter(l=>l.resident_id===id).sort((a,b)=>new Date(b.occurred_at)-new Date(a.occurred_at));
          const logsAsc = [...logs].sort((a,b)=>new Date(a.occurred_at)-new Date(b.occurred_at));
          const riskFlags = computeRiskFlags(logsAsc);
          const shiftDurations = shiftDurationsByOutId(logsAsc);
          const flaggedCount = logs.filter(l=>hasAnyFlag(riskFlags[l.id])).length;
          const leaves = data.allLeaves.filter(l=>l.resident_id===id);
          const status = residentStatus(logs, leaves);
          const last = logs[0];
          const hours = hoursThisWeek(logs);
          const overLimit = hours >= 80;
          const daysWorked = daysWorkedThisMonth(logs);
          const expanded = state.expandedResidentId === id;
          const lastDist = (hasFacility && last && last.lat!=null) ? distanceMeters(last.lat,last.lng,state.program.facility_lat,state.program.facility_lng) : null;
          const lastOffSite = lastDist != null && lastDist > GEOFENCE_RADIUS_M;
          const rowsHtml = `<tr class="resident-row" data-id="${id}" style="cursor:pointer;">
            <td style="width:16px;color:var(--slate-light);">${expanded ? '▾' : '▸'}</td>
            <td class="resident-name">${data.profilesById[id].full_name}</td>
            <td><span class="pill ${status}" style="margin:0;"><span class="dot"></span>${status==='on'?'On duty':status==='leave'?'On leave':'Off duty'}</span></td>
            <td class="mono">${last ? (last.type==='in' ? 'Clocked in' : 'Clocked out') + ' · ' + fmtDateTime(last.occurred_at) : '—'}</td>
            <td class="mono" style="${overLimit ? 'color:var(--red);font-weight:600;' : ''}">${hours.toFixed(1)}h${overLimit ? ' ⚠' : ''}</td>
            <td class="mono">${daysWorked}</td>
            <td class="coords mono" style="${lastOffSite ? 'color:var(--red);font-weight:600;' : ''}">${last ? (last.lat!=null ? last.lat.toFixed(4)+', '+last.lng.toFixed(4) + (lastDist!=null ? ' ('+Math.round(lastDist)+'m'+(lastOffSite?' ⚠ off-site':'')+')' : '') : 'unavailable') : '—'}</td>
            <td>${flaggedCount>0 ? `<span class="badge denied">${flaggedCount} flagged</span>` : '<span class="log-meta">—</span>'}</td>
          </tr>`;
          const monthGroups = groupLogsByMonth(logs);
          const detailHtml = expanded ? `<tr><td></td><td colspan="7" style="padding:0;">
            <div style="background:var(--cream);border-radius:8px;padding:14px 16px;margin:4px 0 12px;">
              ${logs.length===0 ? '<div class="empty">No clock events recorded.</div>' :
                monthGroups.map((group, gi)=>{
                  const folderKey = id + '::' + group.key;
                  const isOpen = (folderKey in state.monthOverrides) ? state.monthOverrides[folderKey] : (gi === 0);
                  return `
                  <div class="month-folder">
                    <div class="month-folder-header" data-folder-key="${folderKey}">
                      <span class="month-folder-arrow">${isOpen ? '▾' : '▸'}</span>
                      <span class="month-folder-title">${group.label}</span>
                      <span class="month-folder-count">${group.logs.length} event${group.logs.length===1?'':'s'}</span>
                    </div>
                    ${isOpen ? `<div class="month-folder-body">
                      ${group.logs.map(l=>{
                        const dist = (hasFacility && l.lat!=null) ? distanceMeters(l.lat,l.lng,state.program.facility_lat,state.program.facility_lng) : null;
                        const offSite = dist != null && dist > GEOFENCE_RADIUS_M;
                        const rf = riskFlags[l.id] || {};
                        const badges = [];
                        if(rf.accuracySuspicious) badges.push('<span class="badge denied">Unusually precise GPS</span>');
                        if(rf.ipMismatchKm) badges.push(`<span class="badge denied">${Math.round(rf.ipMismatchKm)}km from IP location</span>`);
                        if(rf.impossibleSpeedKmh) badges.push(`<span class="badge denied">${Math.round(rf.impossibleSpeedKmh)}km/h since last event</span>`);
                        if(rf.deviceChanged) badges.push('<span class="badge denied">Different device than last clock event</span>');
                        return `
                        <div class="log-row" style="display:block;">
                          <div style="display:flex;justify-content:space-between;align-items:center;">
                            <div>
                              <span class="log-type ${l.type}">${l.type==='in'?'Clocked in':'Clocked out'}</span>
                              ${(l.type==='out' && shiftDurations[l.id]!=null) ? `<span class="badge approved" style="margin-left:6px;">${shiftDurations[l.id].toFixed(1)}h shift</span>` : ''}
                              ${l.auto_closed ? `<span class="badge pending" style="margin-left:6px;">Auto-closed at ${AUTO_CLOCKOUT_HOURS}h limit</span>` : ''}
                              <div class="log-meta mono" style="${offSite ? 'color:var(--red);' : ''}">${l.lat!=null ? l.lat.toFixed(5)+', '+l.lng.toFixed(5)+' · ±'+l.accuracy_m+'m accuracy' + (dist!=null ? ' · '+Math.round(dist)+'m from hospital'+(offSite?' ⚠ off-site':'') : '') : (l.auto_closed ? 'system-generated, no location' : 'location unavailable')}</div>
                              ${l.ip_address ? `<div class="log-meta mono">IP ${l.ip_address}${l.ip_lat!=null ? ' ('+l.ip_lat.toFixed(2)+', '+l.ip_lng.toFixed(2)+')' : ''}</div>` : ''}
                              ${l.device_label ? `<div class="log-meta mono">Device: ${l.device_label}</div>` : ''}
                            </div>
                            <div class="log-meta mono">${fmtDateTime(l.occurred_at)}</div>
                          </div>
                          ${badges.length ? `<div style="margin-top:6px;display:flex;gap:6px;flex-wrap:wrap;">${badges.join('')}</div>` : ''}
                        </div>
                      `;
                      }).join('')}
                    </div>` : ''}
                  </div>
                `;
                }).join('')
              }
            </div>
          </td></tr>` : '';
          return rowsHtml + detailHtml;
        }).join('')}
      </table>
      </div>`}
    </div>

    <div class="card">
      <h2>Sick leave requests <span class="count">${pendingLeaves.length} pending</span></h2>
      ${data.allLeaves.length===0 ? '<div class="empty">No leave requests filed yet.</div>' : `
      <div class="table-scroll">
      <table>
        <tr><th>Resident</th><th>Dates</th><th>Reason</th><th>Status</th><th></th></tr>
        ${data.allLeaves.map(s=>`
          <tr>
            <td class="resident-name">${data.profilesById[s.resident_id]?.full_name || '—'}</td>
            <td class="mono">${s.start_date} → ${s.end_date}</td>
            <td>${s.reason}</td>
            <td><span class="badge ${s.status}">${s.status}</span></td>
            <td>${s.status==='pending' ? `
              <button class="small-btn approve" data-id="${s.id}" data-action="approved">Approve</button>
              <button class="small-btn deny" data-id="${s.id}" data-action="denied">Deny</button>
            ` : ''}</td>
          </tr>
        `).join('')}
      </table>
      </div>`}
    </div>

    ${renderRotaSection()}
  `;
  document.getElementById('logoutBtn').onclick = signOut;
  const rb2 = document.getElementById('refreshBtn'); if(rb2) rb2.onclick = manualRefresh;
  document.getElementById('exportLogsBtn').onclick = exportTimeLogsCsv;
  document.getElementById('exportLeaveBtn').onclick = exportLeaveCsv;
  const facForm = document.getElementById('facilityForm');
  if(facForm) facForm.onsubmit = saveFacilityLocation;
  const toggleFacBtn = document.getElementById('toggleFacilityForm');
  if(toggleFacBtn) toggleFacBtn.onclick = ()=>{ state.facilityForm = !state.facilityForm; render(); };
  const useLocBtn = document.getElementById('useCurrentLocBtn');
  if(useLocBtn) useLocBtn.onclick = useCurrentLocationForFacility;

  // Rota handlers
  const rotaToggle = document.getElementById('rotaUploadToggleBtn');
  if(rotaToggle) rotaToggle.onclick = ()=>{ state.rotaTab = state.rotaTab==='upload'?'calendar':'upload'; state.masterTab='hidden'; state.rotaParsed=null; state.rotaError=null; render(); };
  const masterToggle = document.getElementById('masterUploadToggleBtn');
  if(masterToggle) masterToggle.onclick = ()=>{ state.masterTab = state.masterTab==='upload'?'hidden':'upload'; state.rotaTab='calendar'; state.masterParsed=null; state.rotaError=null; render(); };
  const rotaFileInput = document.getElementById('rotaFileInput');
  if(rotaFileInput) rotaFileInput.onchange = e=>{ if(e.target.files[0]) handleRotaFile(e.target.files[0]); };
  const masterFileInput = document.getElementById('masterFileInput');
  if(masterFileInput) masterFileInput.onchange = async e=>{
    if(!e.target.files[0]) return;
    const buf = await e.target.files[0].arrayBuffer();
    const parsed = parseMasterExcel(buf);
    if(!parsed){ state.rotaError='Could not parse master schedule file.'; render(); return; }
    state.masterParsed = parsed; state.masterMapping = {}; state.rotaError=null; render();
  };
  const rotaSaveBtn = document.getElementById('rotaSaveBtn');
  if(rotaSaveBtn) rotaSaveBtn.onclick = ()=>{
    document.querySelectorAll('.rota-name-map').forEach(sel=>{ state.rotaMapping[sel.dataset.rotaName] = sel.value; });
    handleRotaSave();
  };
  const masterSaveBtn = document.getElementById('masterSaveBtn');
  if(masterSaveBtn) masterSaveBtn.onclick = async ()=>{
    document.querySelectorAll('.master-name-map').forEach(sel=>{ state.masterMapping[sel.dataset.masterName] = sel.value; });
    state.masterSaving = true; render();
    const err = await saveMasterSchedule(state.masterParsed, state.masterMapping);
    state.masterSaving = false;
    if(err){ state.rotaError='Save failed: '+err.message; render(); return; }
    state.masterParsed=null; state.masterTab='hidden'; state.rotaError=null;
    await loadAllData(); render();
  };
  const rotaPrev = document.getElementById('rotaPrevWeekBtn');
  if(rotaPrev) rotaPrev.onclick = ()=>{ state.rotaWeekOffset--; render(); };
  const rotaNext = document.getElementById('rotaNextWeekBtn');
  if(rotaNext) rotaNext.onclick = ()=>{ state.rotaWeekOffset++; render(); };

  document.querySelectorAll('.resident-row').forEach(row=>{
    row.onclick = ()=>{
      const id = row.dataset.id;
      state.expandedResidentId = (state.expandedResidentId === id) ? null : id;
      render();
    };
  });
  document.querySelectorAll('[data-action]').forEach(b=>{
    b.onclick = (e)=>{
      e.stopPropagation();
      setLeaveStatus(b.dataset.id, b.dataset.action);
    };
  });
  document.querySelectorAll('.month-folder-header').forEach(h=>{
    h.onclick = (e)=>{
      e.stopPropagation();
      const key = h.dataset.folderKey;
      const currentlyOpen = (key in state.monthOverrides) ? state.monthOverrides[key] : false;
      // We don't know here whether this was the "default open" first folder, so just toggle
      // based on what's currently rendered (the arrow tells us — ▾ means open).
      const wasOpen = h.querySelector('.month-folder-arrow').textContent === '▾';
      state.monthOverrides[key] = !wasOpen;
      render();
    };
  });
}

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(e=>console.warn('Service worker registration failed:', e));
  });
}

(async function init(){
  render();
  await refreshSession();
  await loadAllData();
  render();

  // Refresh data every 60 seconds in the background so the dashboard
  // stays current without any manual action — important for iOS PWA
  // where pull-to-refresh is not available in standalone mode.
  setInterval(async ()=>{
    if(!state.profile || state.isClocking) return;
    await loadAllData();
    render();
  }, 60000);

  // Refresh immediately whenever the app comes back to the foreground —
  // covers the case where a resident switches away and returns, or
  // wakes their phone after leaving the app open in the background.
  document.addEventListener('visibilitychange', async ()=>{
    if(document.visibilityState === 'visible' && state.profile && !state.isClocking){
      await loadAllData();
      render();
    }
  });

  // Update only the clock digits every second — never re-render the full page.
  // Calling render() every second destroys and recreates the DOM, which
  // dismisses date pickers and resets the "Saving..." button state mid-save.
  setInterval(()=>{
    if(state.profile?.role !== 'resident') return;
    if(state.isClocking) return;
    const el = document.getElementById('live-clock');
    if(el) el.textContent = new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  }, 1000);
})();
</script>
